name: Deploy Frontend (Production)

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.RAD_FRONTEND_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.RAD_FRONTEND_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Frontend
        run: |
          rsync -az --delete \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./ ${{ secrets.RAD_FRONTEND_USER }}@${{ secrets.RAD_FRONTEND_HOST }}:${{ secrets.RAD_FRONTEND_APP_DIR }}

      - name: Build & Run
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.RAD_FRONTEND_USER }}@${{ secrets.RAD_FRONTEND_HOST }} << 'EOF'
            cd ${{ secrets.RAD_FRONTEND_APP_DIR }}
            npm install
            npm run build
            docker compose down
            docker compose up -d --build
          EOF